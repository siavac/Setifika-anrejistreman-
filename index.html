<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sètifika Anrejistreman SIAVAC</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eeeeee;
margin:0;
padding:15px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
position:relative;
overflow:hidden;
}

.container:before{
content:"";
position:absolute;
inset:0;
background:url("https://i.ibb.co/zTz2rrh8/sketch-1782265870898.jpg") center no-repeat;
background-size:350px;
opacity:0.06;
z-index:0;
}

.content{
position:relative;
z-index:1;
}

.logo{
width:120px;
display:block;
margin:auto;
}

h1,h2{
text-align:center;
color:#0b3d91;
}

.line{
height:3px;
background:#0b3d91;
margin:15px 0;
}

label{
font-weight:bold;
display:block;
margin-top:12px;
}

input,textarea{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #aaa;
margin-top:5px;
font-size:15px;
}

textarea{
height:90px;
}

.photo-preview{
width:200px;
max-width:100%;
margin-top:10px;
border-radius:8px;
}

.cert-box{
border:2px solid #0b3d91;
padding:15px;
border-radius:10px;
}

.qr{
text-align:center;
margin-top:20px;
}

button{
width:100%;
padding:13px;
margin-top:20px;
background:#0b3d91;
color:white;
border:none;
border-radius:8px;
font-size:16px;
}

.signature{
display:flex;
justify-content:space-between;
margin-top:50px;
}

.signature div{
width:45%;
text-align:center;
}

@media(max-width:600px){

.signature{
flex-direction:column;
}

.signature div{
width:100%;
margin-bottom:30px;
}

}
</style>

</head>

<body>

<div class="container" id="certificat">

<div class="content">

<img class="logo" src="https://i.ibb.co/zTz2rrh8/sketch-1782265870898.jpg">

<h1>
SERVICE INTELLIGENCE<br>
ANTI-VOL ANTI-CRIME
</h1>

<h2>SIAVAC</h2>

<div class="line"></div>

<h2>
SÈTIFIKA ANREJISTREMAN OFISYÈL
</h2>


<div class="cert-box">

<label>Nimewo Sètifika</label>
<input id="numero" value="SIAVAC-2026-0001">


<label>Dat Emisyon</label>
<input type="date" id="date">


<label>Non Pwopriyetè / Antite</label>
<input id="nom" placeholder="Antre non an">


<label>Materyèl / Dosye</label>
<input id="materiel" placeholder="Egzanp: Telefòn, machin, dokiman">


<label>Deskripsyon</label>
<textarea id="description"
placeholder="Ekri detay yo isit la"></textarea>


<label>Foto Materyèl</label>
<input type="file" accept="image/*" onchange="previewImage(event)">

<img id="photo" class="photo-preview">

</div>


<div class="qr">

<h3>QR CODE VERIFIKASYON</h3>

<div id="qrcode"></div>

</div>


<div class="signature">

<div>
_____________________<br>
Responsab SIAVAC
</div>

<div>
_____________________<br>
Pwopriyetè
</div>

</div>


</div>

</div>


<button onclick="generateQR()">
Kreye QR Code
</button>

<button onclick="downloadPDF()">
Telechaje PDF
</button>


<script>

function previewImage(event){

let img=document.getElementById("photo");

img.src=URL.createObjectURL(event.target.files[0]);

}


function generateQR(){

document.getElementById("qrcode").innerHTML="";

let data=
"SIAVAC CERTIFICAT\n"+
"Numero: "+document.getElementById("numero").value+"\n"+
"Nom: "+document.getElementById("nom").value+"\n"+
"Materiel: "+document.getElementById("materiel").value+"\n"+
"Date: "+document.getElementById("date").value;


new QRCode(document.getElementById("qrcode"),{
text:data,
width:150,
height:150
});

}


function downloadPDF(){

generateQR();

let element=document.getElementById("certificat");

let options={
margin:10,
filename:"Certificat_SIAVAC.pdf",
image:{type:"jpeg",quality:0.98},
html2canvas:{scale:2},
jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}
};

html2pdf().set(options).from(element).save();

}

</script>

</body>
</html>
